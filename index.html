<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سعر الذهب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.box {
    width: 95%;
    max-width: 400px;
    background: white;
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
img { width: 90px; }
.price {
    font-size: 24px;
    font-weight: bold;
    color: #d4af37;
}
.manual {
    color: #e67e22;
    font-size: 13px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
td {
    padding: 6px;
    text-align: right;
}
input, select, button {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    background: #d4af37;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
button:hover { background: #b8962e; }
.error { color: red; }
footer {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
    direction: rtl;
}
canvas {
    margin-top: 10px;
    background: #fafafa;
    border-radius: 10px;
}
.history {
    font-size: 13px;
    text-align: right;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
<img src="https://cdn-icons-png.flaticon.com/512/138/138292.png">

<h3>سعر أونصة الذهب</h3>
<div class="price" id="ounce">--</div>
<div class="manual" id="manualTag"></div>

<select id="currency">
    <option value="USD">USD</option>
</select>

<input type="number" id="manualPrice" placeholder="إدخال سعر الأونصة يدويًا">
<button onclick="applyManual()">حفظ السعر اليدوي</button>
<button onclick="loadGoldPrice()">🔄 تحديث</button>

<table dir="rtl">
<tr><td>غرام 24</td><td id="g24">--</td></tr>
<tr><td>غرام 22</td><td id="g22">--</td></tr>
<tr><td>غرام 21</td><td id="g21">--</td></tr>
<tr><td>غرام 18</td><td id="g18">--</td></tr>
</table>

<hr>

<h4>🔁 محول شامل</h4>
<select id="convertType">
    <option value="moneyToGold">💰 من المال إلى ذهب</option>
    <option value="goldToMoney">🟡 من الذهب إلى مال</option>
</select>

<input type="number" id="convertValue" placeholder="أدخل المبلغ أو الغرام">
<button onclick="convertAll()">تحويل لكل العيارات</button>

<div id="convertResult"></div>

<canvas id="chart" width="330" height="150"></canvas>

<div class="history" id="history"></div>

<div class="error" id="error"></div>

<footer>© 2025 | 💻 ✨ 🟡 برمجة فؤاد أبو الحارث</footer>
</div>

<script>
const API_KEY = "goldapi-cvc4msmjinl6ew-io";
let lastPrices = {};

function calculate(price, currency) {
    const gram24 = price / 31.1035;
    lastPrices = {
        24: gram24,
        22: gram24 * 22 / 24,
        21: gram24 * 21 / 24,
        18: gram24 * 18 / 24
    };
    document.getElementById("ounce").innerText = price.toFixed(2) + " " + currency;
    document.getElementById("g24").innerText = lastPrices[24].toFixed(2);
    document.getElementById("g22").innerText = lastPrices[22].toFixed(2);
    document.getElementById("g21").innerText = lastPrices[21].toFixed(2);
    document.getElementById("g18").innerText = lastPrices[18].toFixed(2);
}

async function loadGoldPrice() {
    try {
        const res = await fetch("https://www.goldapi.io/api/XAU/USD", {
            headers: { "x-access-token": API_KEY }
        });
        const data = await res.json();
        calculate(data.price, "USD");
        document.getElementById("manualTag").innerText = "";
    } catch {
        document.getElementById("error").innerText =
            "❌ فشل الجلب – استخدم الإدخال اليدوي";
    }
}

function applyManual() {
    const v = parseFloat(document.getElementById("manualPrice").value);
    if (!v) return;
    calculate(v, "USD");
    document.getElementById("manualTag").innerText = "⚠ السعر مُدخل يدويًا";
}

function convertAll() {
    const val = parseFloat(document.getElementById("convertValue").value);
    if (!val) return;

    const type = document.getElementById("convertType").value;
    let result = "";
    let values = [];

    for (let k in lastPrices) {
        let r = type === "moneyToGold"
            ? (val / lastPrices[k]).toFixed(2) + " غ"
            : (val * lastPrices[k]).toFixed(2) + " USD";

        result += `عيار ${k}: ${r}<br>`;
        values.push(type === "moneyToGold"
            ? val / lastPrices[k]
            : val * lastPrices[k]);
    }

    document.getElementById("convertResult").innerHTML = result;
    drawChart(values);
    saveHistory(result);
}

function drawChart(vals) {
    const c = document.getElementById("chart");
    const ctx = c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);

    const max = Math.max(...vals);
    const barWidth = 60;
    vals.forEach((v,i)=>{
        const h = (v/max)*100;
        ctx.fillStyle="#d4af37";
        ctx.fillRect(20+i*80,120-h,barWidth,h);
        ctx.fillStyle="#000";
        ctx.fillText([24,22,21,18][i],35+i*80,140);
    });
}

function saveHistory(text) {
    let h = JSON.parse(localStorage.getItem("history")||"[]");
    h.unshift(text);
    h = h.slice(0,5);
    localStorage.setItem("history",JSON.stringify(h));
    showHistory();
}

function showHistory() {
    const h = JSON.parse(localStorage.getItem("history")||"[]");
    document.getElementById("history").innerHTML =
        "<b>🕒 آخر العمليات:</b><br>" + h.join("<hr>");
}

showHistory();
loadGoldPrice();
</script>

</body>
</html>
