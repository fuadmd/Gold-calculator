<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>سعر الذهب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 95%;
            max-width: 360px;
            background: white;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        img {
            width: 90px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .grams td {
            padding: 6px;
            font-size: 16px;
            text-align: right;
        }

        tr:nth-child(even) {
            background: #f8f8f8;
        }

        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="box">
    <img src="https://cdn-icons-png.flaticon.com/512/138/138292.png" alt="gold">

    <h2>سعر أونصة الذهب</h2>
    <div class="price" id="ounce">-- USD</div>

    <table dir="rtl" class="grams">
        <tr><td>غرام 24</td><td id="g24">--</td></tr>
        <tr><td>غرام 22</td><td id="g22">--</td></tr>
        <tr><td>غرام 21</td><td id="g21">--</td></tr>
        <tr><td>غرام 18</td><td id="g18">--</td></tr>
    </table>

    <div id="error" class="error"></div>
    <footer>© 2025 | برمجة فؤاد أبو الحارث</footer>
</div>

<script>
async function loadGoldPrice() {
    try {
        const response = await fetch("https://www.goldapi.io/api/XAU/USD", {
            headers: {
                "x-access-token": "goldapi-cvc4msmjinl6ew-io",
                "Content-Type": "application/json"
            }
        });

        if (!response.ok) {
            throw new Error("API Error");
        }

        const data = await response.json();
        const ounce = data.price;
        const gram24 = ounce / 31.1035;

        document.getElementById("ounce").innerText =
            ounce.toFixed(2) + " USD";

        document.getElementById("g24").innerText =
            gram24.toFixed(2) + " USD";

        document.getElementById("g22").innerText =
            (gram24 * 22 / 24).toFixed(2) + " USD";

        document.getElementById("g21").innerText =
            (gram24 * 21 / 24).toFixed(2) + " USD";

        document.getElementById("g18").innerText =
            (gram24 * 18 / 24).toFixed(2) + " USD";

    } catch (err) {
        document.getElementById("error").innerText =
            "❌ تعذر جلب الأسعار حالياً";
        console.error(err);
    }
}

loadGoldPrice();
</script>

</body>
</html>
