<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سعر الذهب اليوم</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    width: 450px;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
}

h1 {
    margin-bottom: 15px;
}

.price {
    font-size: 20px;
    margin: 8px 0;
}

.loading {
    color: gray;
}
</style>
</head>

<body>

<div class="box">
    <h1>سعر الذهب اليوم</h1>

    <div class="price loading" id="ounce">جاري تحميل السعر...</div>

    <hr>

    <div class="price" id="g24"></div>
    <div class="price" id="g22"></div>
    <div class="price" id="g21"></div>
    <div class="price" id="g18"></div>
</div>

<script>
async function loadGoldPrice() {
    try {
        const response = await fetch(
            "https://api.exchangerate.host/latest?base=XAU&symbols=USD"
        );
        const data = await response.json();

        const ouncePrice = data.rates.USD; // سعر الأونصة بالدولار
        const gramPrice = ouncePrice / 31.1035;

        document.getElementById("ounce").textContent =
            `سعر أونصة الذهب: ${ouncePrice.toFixed(2)} $`;

        document.getElementById("g24").textContent =
            `غرام عيار 24: ${gramPrice.toFixed(2)} $`;

        document.getElementById("g22").textContent =
            `غرام عيار 22: ${(gramPrice * 0.916).toFixed(2)} $`;

        document.getElementById("g21").textContent =
            `غرام عيار 21: ${(gramPrice * 0.875).toFixed(2)} $`;

        document.getElementById("g18").textContent =
            `غرام عيار 18: ${(gramPrice * 0.75).toFixed(2)} $`;

    } catch (err) {
        document.getElementById("ounce").textContent =
            "تعذر جلب سعر الذهب حالياً";
    }
}

loadGoldPrice();
</script>

</body>
</html>
