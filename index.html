<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حساب سعر الذهب</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    width: 420px;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
}

h1 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 18px;
    margin-bottom: 15px;
    text-align: center;
}

.price {
    font-size: 20px;
    margin: 8px 0;
}
</style>
</head>

<body>

<div class="box">
    <h1>حساب سعر الذهب</h1>

    <input
        type="number"
        id="ounceInput"
        placeholder="أدخل سعر أونصة الذهب بالدولار"
        oninput="calculateGold()"
    >

    <div class="price" id="g24">غرام عيار 24: -</div>
    <div class="price" id="g22">غرام عيار 22: -</div>
    <div class="price" id="g21">غرام عيار 21: -</div>
    <div class="price" id="g18">غرام عيار 18: -</div>
</div>

<script>
function calculateGold() {
    const ouncePrice = parseFloat(
        document.getElementById("ounceInput").value
    );

    if (!ouncePrice || ouncePrice <= 0) {
        document.getElementById("g24").textContent = "غرام عيار 24: -";
        document.getElementById("g22").textContent = "غرام عيار 22: -";
        document.getElementById("g21").textContent = "غرام عيار 21: -";
        document.getElementById("g18").textContent = "غرام عيار 18: -";
        return;
    }

    const gram = ouncePrice / 31.1035;

    document.getElementById("g24").textContent =
        `غرام عيار 24: ${gram.toFixed(2)} $`;

    document.getElementById("g22").textContent =
        `غرام عيار 22: ${(gram * 0.916).toFixed(2)} $`;

    document.getElementById("g21").textContent =
        `غرام عيار 21: ${(gram * 0.875).toFixed(2)} $`;

    document.getElementById("g18").textContent =
        `غرام عيار 18: ${(gram * 0.75).toFixed(2)} $`;
}
</script>

</body>
</html>
