<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سعر الذهب اللحظي - فؤاد أبو الحارث</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        /* تغيير الخلفية للون المطلوب */
        background: #34495E; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .box {
        width: 95%;
        max-width: 400px;
        background: white;
        border-radius: 18px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    img { width: 90px; }
    h3 { color: #2c3e50; margin-bottom: 5px; }
    .price {
        font-size: 26px;
        font-weight: bold;
        color: #d4af37;
        margin: 10px 0;
    }
    .status-tag {
        font-size: 13px;
        margin-bottom: 10px;
        font-weight: bold;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }
    td {
        padding: 10px;
        text-align: right;
        border-bottom: 1px solid #eee;
        color: #333;
    }
    input, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }
    button {
        background: #d4af37;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: 0.3s;
    }
    button:hover { background: #b8962e; }
    .btn-update { background: #2c3e50; }
    .btn-update:hover { background: #1a252f; }
    
    .error { color: #e74c3c; margin-top: 10px; font-size: 13px; }
    footer {
        margin-top: 15px;
        font-size: 11px;
        color: #7f8c8d;
        direction: rtl;
    }
    canvas {
        margin-top: 15px;
        background: #fdfdfd;
        border-radius: 10px;
        border: 1px solid #eee;
    }
    .history {
        font-size: 12px;
        text-align: right;
        margin-top: 15px;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
    }
    #convertResult {
        margin-top: 10px;
        text-align: right;
        font-size: 14px;
        color: #2c3e50;
        line-height: 1.6;
    }
</style>
</head>

<body>

<div class="box">
    <img src="https://cdn-icons-png.flaticon.com/512/138/138292.png" alt="Gold">

    <h3>سعر أونصة الذهب مباشر</h3>
    <div class="price" id="ounce">جاري الجلب...</div>
    <div class="status-tag" id="statusTag"></div>

    <input type="number" id="manualPrice" placeholder="إدخال سعر الأونصة يدويًا">
    <button onclick="applyManual()">حفظ السعر اليدوي</button>
    <button class="btn-update" onclick="loadGoldPrice()">🔄 تحديث السعر الآن</button>

    <table dir="rtl">
        <tr><td>غرام 24</td><td id="g24">--</td></tr>
        <tr><td>غرام 22</td><td id="g22">--</td></tr>
        <tr><td>غرام 21</td><td id="g21">--</td></tr>
        <tr><td>غرام 18</td><td id="g18">--</td></tr>
    </table>

    <hr style="opacity: 0.3; margin: 20px 0;">

    <h4>🔁 محول الأوزان</h4>
    <select id="convertType">
        <option value="moneyToGold">💰 من دولار إلى ذهب</option>
        <option value="goldToMoney">🟡 من ذهب إلى دولار</option>
    </select>

    <input type="number" id="convertValue" placeholder="أدخل الكمية">
    <button onclick="convertAll()">تحويل النتائج</button>

    <div id="convertResult"></div>

    <canvas id="chart" width="330" height="150"></canvas>

    <div class="history" id="history"></div>
    <div class="error" id="error"></div>

    <footer>© 2025 | 💻  برمجة فؤاد أبو الحارث</footer>
</div>

<script>
let lastPrices = {};

function calculate(price, currency) {
    const gram24 = price / 31.1034768;
    lastPrices = {
        24: gram24,
        22: gram24 * 22 / 24,
        21: gram24 * 21 / 24,
        18: gram24 * 18 / 24
    };
    
    document.getElementById("ounce").innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + currency;
    document.getElementById("g24").innerText = lastPrices[24].toFixed(2) + " $";
    document.getElementById("g22").innerText = lastPrices[22].toFixed(2) + " $";
    document.getElementById("g21").innerText = lastPrices[21].toFixed(2) + " $";
    document.getElementById("g18").innerText = lastPrices[18].toFixed(2) + " $";
}

async function loadGoldPrice() {
    try {
        const response = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT");
        const data = await response.json();
        const goldPrice = parseFloat(data.price);
        
        if (goldPrice) {
            calculate(goldPrice, "USD");
            const tag = document.getElementById("statusTag");
            tag.innerText = "● تحديث مباشر من السوق";
            tag.style.color = "#27ae60";
            document.getElementById("error").innerText = "";
        }
    } catch (err) {
        document.getElementById("error").innerText = "❌ فشل الاتصال التلقائي";
    }
}

function applyManual() {
    const v = parseFloat(document.getElementById("manualPrice").value);
    if (!v) return;
    calculate(v, "USD");
    const tag = document.getElementById("statusTag");
    tag.innerText = "⚠ السعر مُدخل يدويًا";
    tag.style.color = "#e67e22";
}

function convertAll() {
    const val = parseFloat(document.getElementById("convertValue").value);
    if (!val || !lastPrices[24]) return;

    const type = document.getElementById("convertType").value;
    let result = "";
    let values = [];

    for (let k in lastPrices) {
        let resVal = type === "moneyToGold" 
            ? (val / lastPrices[k]).toFixed(3) + " غرام" 
            : (val * lastPrices[k]).toFixed(2) + " $";

        result += `عيار ${k}: <b>${resVal}</b><br>`;
        values.push(type === "moneyToGold" ? val / lastPrices[k] : val * lastPrices[k]);
    }

    document.getElementById("convertResult").innerHTML = result;
    drawChart(values);
    saveHistory(type === "moneyToGold" ? val + "$ تحويل" : val + " غرام تحويل");
}

function drawChart(vals) {
    const c = document.getElementById("chart");
    const ctx = c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);
    const max = Math.max(...vals);
    const barWidth = 45;
    vals.forEach((v,i)=>{
        const h = (v/max)*100;
        ctx.fillStyle="#d4af37";
        ctx.fillRect(45+i*70, 120-h, barWidth, h);
        ctx.fillStyle="#7f8c8d";
        ctx.font = "bold 12px Arial";
        ctx.fillText(["ع24","ع22","ع21","ع18"][i], 55+i*70, 140);
    });
}

function saveHistory(text) {
    let h = JSON.parse(localStorage.getItem("history")||"[]");
    const time = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
    h.unshift(`[${time}] ${text}`);
    h = h.slice(0,3);
    localStorage.setItem("history",JSON.stringify(h));
    showHistory();
}

function showHistory() {
    const h = JSON.parse(localStorage.getItem("history")||"[]");
    document.getElementById("history").innerHTML = h.length > 0 ? "<b>🕒 السجل:</b><br>" + h.join("<hr style='margin:5px 0; opacity:0.1'>") : "";
}

showHistory();
loadGoldPrice();
setInterval(loadGoldPrice, 300000); // تحديث كل 5 دقائق

</script>
</body>
</html>
