<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق سعر الذهب - فؤاد أبو الحارث</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#34495E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/138/138292.png">
    
    <!-- إضافة مكتبة Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #34495E; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            width: 95%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin: 20px 0;
        }
        img { width: 60px; margin-bottom: 10px; }
        h3 { color: #2c3e50; margin: 5px 0; }
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #d4af37;
            margin: 10px 0;
        }
        .status-tag {
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid #eee;
            color: #333;
            font-weight: 500;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background: #d4af37;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s ease;
        }
        button:hover { background: #b8962e; }
        .btn-update { background: #2c3e50; margin-top: 5px; }
        .btn-update:hover { background: #1a252f; }
        
        .error { color: #e74c3c; margin-top: 10px; font-size: 13px; }
        footer {
            margin-top: 20px;
            font-size: 11px;
            color: #95a5a6;
            direction: rtl;
        }
        
        /* تنسيق قسم الشارت الجديد */
        .chart-container {
            margin-top: 25px;
            background: #fdfdfd;
            border-radius: 12px;
            border: 1px solid #eee;
            padding: 10px;
            position: relative;
        }
        .chart-tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        .chart-tabs button {
            width: auto;
            padding: 5px 15px;
            font-size: 12px;
            margin-top: 0;
            background: #ecf0f1;
            color: #7f8c8d;
        }
        .chart-tabs button.active {
            background: #d4af37;
            color: white;
        }

        .history {
            font-size: 12px;
            text-align: right;
            margin-top: 15px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            border-right: 4px solid #d4af37;
        }
        #convertResult {
            margin-top: 15px;
            text-align: right;
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.8;
            background: #fff9e6;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="box">
    <img src="https://cdn-icons-png.flaticon.com/512/138/138292.png" alt="Gold Logo">

    <h3>سعر أونصة الذهب</h3>
    <div class="price" id="ounce">جاري التحميل...</div>
    <div class="status-tag" id="statusTag"></div>

    <input type="number" id="manualPrice" placeholder="أدخل سعر الأونصة يدوياً">
    <button onclick="applyManual()">💾 حفظ السعر اليدوي</button>
    <button class="btn-update" onclick="loadGoldPrice()">🔄 تحديث تلقائي الآن</button>

    <table dir="rtl">
        <tr><td>غرام عيار 24</td><td id="g24">--</td></tr>
        <tr><td>غرام عيار 22</td><td id="g22">--</td></tr>
        <tr><td>غرام عيار 21</td><td id="g21">--</td></tr>
        <tr><td>غرام عيار 18</td><td id="g18">--</td></tr>
    </table>

    <hr style="opacity: 0.2; margin: 25px 0;">

    <h4>🔁 محول الأوزان والمال</h4>
    <select id="convertType">
        <option value="moneyToGold">💰 تحويل من دولار إلى ذهب</option>
        <option value="goldToMoney">🟡 تحويل من ذهب إلى دولار</option>
    </select>

    <input type="number" id="convertValue" placeholder="أدخل القيمة هنا">
    <button onclick="convertAll()">إظهار نتائج التحويل</button>

    <div id="convertResult" style="display:none;"></div>

    <!-- قسم الشارت المطور -->
    <div class="chart-container">
        <div class="chart-tabs">
            <button id="btn-1d" onclick="updateChartPeriod('1d')" class="active">يوم</button>
            <button id="btn-1w" onclick="updateChartPeriod('1w')">أسبوع</button>
            <button id="btn-1m" onclick="updateChartPeriod('1m')">شهر</button>
        </div>
        <canvas id="goldChart"></canvas>
    </div>

    <div class="history" id="history"></div>
    <div class="error" id="error"></div>

    <footer>© 2025 | 💻 برمجة فؤاد أبو الحارث</footer>
</div>

<script>
// تسجيل الـ Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('PWA Service Worker Registered');
        }).catch(err => console.log('SW Registration Failed', err));
    });
}

let lastPrices = {};
let myChart = null;
let currentPeriod = '1d';

// دالة الحساب
function calculate(price, currency) {
    const gram24 = price / 31.1034768;
    lastPrices = {
        24: gram24,
        22: gram24 * 22 / 24,
        21: gram24 * 21 / 24,
        18: gram24 * 18 / 24
    };
    
    document.getElementById("ounce").innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + currency;
    document.getElementById("g24").innerText = lastPrices[24].toFixed(2) + " $";
    document.getElementById("g22").innerText = lastPrices[22].toFixed(2) + " $";
    document.getElementById("g21").innerText = lastPrices[21].toFixed(2) + " $";
    document.getElementById("g18").innerText = lastPrices[18].toFixed(2) + " $";
}

// جلب السعر المباشر
async function loadGoldPrice() {
    try {
        const response = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT");
        const data = await response.json();
        const goldPrice = parseFloat(data.price);
        
        if (goldPrice) {
            calculate(goldPrice, "USD");
            const tag = document.getElementById("statusTag");
            tag.innerText = "● تحديث مباشر من السوق العالمي";
            tag.style.color = "#27ae60";
            document.getElementById("error").innerText = "";
            // تحديث الشارت عند التحميل الأول
            if (!myChart) fetchHistoricalData(currentPeriod);
        }
    } catch (err) {
        document.getElementById("error").innerText = "❌ خطأ في الشبكة - استخدم اليدوي";
    }
}

// جلب البيانات التاريخية للشارت
async function fetchHistoricalData(period) {
    let interval = '1h'; // ليوم واحد
    let limit = 24;
    
    if (period === '1w') {
        interval = '4h';
        limit = 42; // 7 days * 6 (4h intervals)
    } else if (period === '1m') {
        interval = '1d';
        limit = 30;
    }

    try {
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=${interval}&limit=${limit}`);
        const data = await response.json();
        
        const labels = data.map(d => {
            const date = new Date(d[0]);
            if (period === '1d') return date.getHours() + ":00";
            return (date.getMonth() + 1) + "/" + date.getDate();
        });
        
        const prices = data.map(d => parseFloat(d[4])); // سعر الإغلاق
        
        renderChart(labels, prices);
    } catch (err) {
        console.error("Error fetching historical data", err);
    }
}

function renderChart(labels, data) {
    const ctx = document.getElementById('goldChart').getContext('2d');
    
    if (myChart) {
        myChart.destroy();
    }
    
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'سعر الأونصة ($)',
                data: data,
                borderColor: '#d4af37',
                backgroundColor: 'rgba(212, 175, 55, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: {
                    display: true,
                    grid: { display: false },
                    ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 6, font: { size: 10 } }
                },
                y: {
                    display: true,
                    position: 'right',
                    ticks: { font: { size: 10 } }
                }
            }
        }
    });
}

function updateChartPeriod(period) {
    currentPeriod = period;
    // تحديث شكل الأزرار
    document.querySelectorAll('.chart-tabs button').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${period}`).classList.add('active');
    
    fetchHistoricalData(period);
}

function applyManual() {
    const v = parseFloat(document.getElementById("manualPrice").value);
    if (!v) return;
    calculate(v, "USD");
    const tag = document.getElementById("statusTag");
    tag.innerText = "⚠ السعر مُدخل يدويًا";
    tag.style.color = "#e67e22";
}

function convertAll() {
    const val = parseFloat(document.getElementById("convertValue").value);
    if (!val || !lastPrices[24]) return;

    const type = document.getElementById("convertType").value;
    const resDiv = document.getElementById("convertResult");
    resDiv.style.display = "block";
    let result = "";

    for (let k in lastPrices) {
        let resVal = type === "moneyToGold" 
            ? (val / lastPrices[k]).toFixed(3) + " غرام" 
            : (val * lastPrices[k]).toFixed(2) + " $";

        result += `عيار ${k}: <b>${resVal}</b><br>`;
    }

    resDiv.innerHTML = result;
    saveHistory(type === "moneyToGold" ? val + "$ إلى ذهب" : val + " غرام إلى $");
}

function saveHistory(text) {
    let h = JSON.parse(localStorage.getItem("history")||"[]");
    const time = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
    h.unshift(`[${time}] ${text}`);
    h = h.slice(0,3);
    localStorage.setItem("history",JSON.stringify(h));
    showHistory();
}

function showHistory() {
    const h = JSON.parse(localStorage.getItem("history")||"[]");
    document.getElementById("history").innerHTML = h.length > 0 ? "<b>🕒 السجل الأخير:</b><br>" + h.join("<hr style='margin:5px 0; opacity:0.05'>") : "";
}

showHistory();
loadGoldPrice();
setInterval(loadGoldPrice, 300000); // تحديث كل 5 دقائق

</script>
</body>
</html>
